  <script>
    (function () {
      const video = document.getElementById('showreel-video');
      const soundToggle = document.getElementById('sound-toggle');

      function updateButton() {
        const isMuted = video.muted;
        soundToggle.textContent = isMuted ? 'Sound on' : 'Sound off';
        soundToggle.setAttribute('aria-pressed', String(!isMuted));
      }

      async function tryPlayWithSound() {
        video.muted = false;
        try {
          await video.play();
        } catch (error) {
          video.muted = true;
          try {
            await video.play();
          } catch (playError) {
            // Leave the browser default state if playback is still blocked.
          }
        }
        updateButton();
      }

      soundToggle.addEventListener('click', async function () {
        if (video.muted) {
          video.muted = false;
          try {
            await video.play();
          } catch (error) {
            video.muted = true;
          }
        } else {
          video.muted = true;
        }
        updateButton();
      });

      const firstInteraction = async function () {
        await tryPlayWithSound();
        window.removeEventListener('pointerdown', firstInteraction);
        window.removeEventListener('keydown', firstInteraction);
        window.removeEventListener('touchstart', firstInteraction);
      };

      window.addEventListener('pointerdown', firstInteraction, { once: true });
      window.addEventListener('keydown', firstInteraction, { once: true });
      window.addEventListener('touchstart', firstInteraction, { once: true });

      updateButton();
    })();
  </script>
